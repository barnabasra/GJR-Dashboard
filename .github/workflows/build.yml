name: Build data.json

on:
  push:
    paths:
      - '**.xlsx'          # jalan tiap file Excel di-update/di-push
  workflow_dispatch:        # bisa dijalankan manual dari tab Actions
  # schedule:
  #   - cron: '0 1 * * 1-5' # (opsional) tiap hari kerja 08:00 WIB (01:00 UTC)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Convert Excel -> data.json
        run: python convert.py

      - name: Commit data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan data.json."
          else
            git commit -m "Auto-update data.json [skip ci]"
            git push
          fi
